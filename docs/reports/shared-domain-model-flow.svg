<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Shared Domain Model Implementation Flow</title>
  <desc id="desc">Architecture diagram showing shared TypeScript contract flowing into web canvas, API, AI workflow, and later persistence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 700 30px Arial, sans-serif; }
      .subtitle { fill: #475569; font: 16px Arial, sans-serif; }
      .section { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .core { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; }
      .web { fill: #ecfdf5; stroke: #059669; stroke-width: 2; }
      .api { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; }
      .ai { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .future { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 6; }
      .label { fill: #0f172a; font: 700 18px Arial, sans-serif; }
      .body { fill: #334155; font: 14px Arial, sans-serif; }
      .small { fill: #475569; font: 13px Arial, sans-serif; }
      .arrow { stroke: #334155; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .muted-arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
      .pill { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .pill-text { fill: #334155; font: 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="620"/>

  <text class="title" x="60" y="58">Shared Domain Model Implementation</text>
  <text class="subtitle" x="60" y="86">1단계 작업 결과: 공통 TypeScript 계약과 mock planning fixture를 기준점으로 만든 흐름</text>

  <rect class="section core" x="370" y="135" width="460" height="185" rx="14"/>
  <text class="label" x="410" y="178">packages/shared</text>
  <text class="body" x="410" y="210">공통 graph contract</text>
  <text class="small" x="410" y="238">Project · Requirement · ComponentNode</text>
  <text class="small" x="410" y="262">DependencyEdge · RoadmapStep</text>
  <text class="small" x="410" y="286">PlanningRequest · PlanningResult</text>

  <rect class="pill" x="610" y="166" width="175" height="34" rx="17"/>
  <text class="pill-text" x="632" y="188">mockPlanningResult</text>
  <rect class="pill" x="610" y="212" width="175" height="34" rx="17"/>
  <text class="pill-text" x="642" y="234">type exports</text>
  <rect class="pill" x="610" y="258" width="175" height="34" rx="17"/>
  <text class="pill-text" x="638" y="280">build/typecheck</text>

  <rect class="section web" x="70" y="390" width="250" height="145" rx="14"/>
  <text class="label" x="105" y="432">apps/web</text>
  <text class="body" x="105" y="462">Canvas MVP</text>
  <text class="small" x="105" y="490">React Flow nodes/edges</text>
  <text class="small" x="105" y="514">Node detail · Roadmap panel</text>

  <rect class="section api" x="370" y="390" width="250" height="145" rx="14"/>
  <text class="label" x="405" y="432">apps/api</text>
  <text class="body" x="405" y="462">FastAPI boundary</text>
  <text class="small" x="405" y="490">PlanningRequest 입력</text>
  <text class="small" x="405" y="514">PlanningResult 반환</text>

  <rect class="section ai" x="670" y="390" width="250" height="145" rx="14"/>
  <text class="label" x="705" y="432">packages/ai</text>
  <text class="body" x="705" y="462">AI planning workflow</text>
  <text class="small" x="705" y="490">요구사항 분석</text>
  <text class="small" x="705" y="514">그래프/로드맵 생성</text>

  <rect class="section future" x="970" y="390" width="170" height="145" rx="14"/>
  <text class="label" x="1005" y="432">infra/db</text>
  <text class="body" x="1005" y="462">Persistence</text>
  <text class="small" x="1005" y="490">Project 저장</text>
  <text class="small" x="1005" y="514">Graph history</text>

  <path class="arrow" d="M 480 320 C 430 350, 330 360, 240 390"/>
  <path class="arrow" d="M 550 320 C 530 350, 510 360, 495 390"/>
  <path class="arrow" d="M 660 320 C 700 350, 755 360, 790 390"/>
  <path class="muted-arrow" d="M 805 462 C 875 462, 915 462, 970 462"/>

  <path class="arrow" d="M 320 462 L 370 462"/>
  <path class="arrow" d="M 620 462 L 670 462"/>

  <text class="small" x="165" y="573">현재 완료</text>
  <rect x="240" y="560" width="26" height="14" class="core" rx="3"/>
  <text class="small" x="278" y="573">1단계: shared contract + fixture</text>
  <rect x="510" y="560" width="26" height="14" class="future" rx="3"/>
  <text class="small" x="548" y="573">후속 단계: API, AI, DB 연결</text>
</svg>
